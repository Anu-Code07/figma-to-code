name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version to publish (e.g. 0.1.0)'
        required: true
        type: string

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm --version

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Verify version is publishable
        run: node scripts/verify-publish-version.mjs "${{ steps.version.outputs.value }}"

      - name: Sync package versions
        run: node scripts/sync-package-versions.mjs "${{ steps.version.outputs.value }}"

      - name: Commit version bump and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/**/package.json packages/generators/**/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: release v${VERSION}"
          fi
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping tag creation"
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
          fi
          git push origin HEAD:main
          git push origin "v${VERSION}" || true

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Verify npm scope access
        run: node scripts/verify-npm-scope.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          echo "## Published @design2code/* v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- CLI: \`npm i -g @design2code/cli@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP: \`npm i -g @design2code/mcp-server@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`v${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
